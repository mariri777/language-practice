<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ゴール · 道のり — 日々</title>
<meta name="theme-color" content="#f1e8d2">
<style>
  :root{
    --bg:#f1e8d2; --bg-elevated:#faf2dc; --bg-tile:#f6ecd2; --bg-deep:#e3d7b5;
    --ink:#14100a; --ink-2:#2c2317; --ink-3:#6a604e; --ink-4:#a59881;
    --red:#8a2438; --red-deep:#5a1622; --red-bright:#b53048; --red-soft:rgba(138,36,56,.08);
    --gold:#b6843a; --green:#2f7c5e; --rule:#c1b491; --hair:rgba(20,16,10,.10);
    --font-ui:-apple-system,BlinkMacSystemFont,"Inter","Hiragino Sans","Yu Gothic UI","Noto Sans JP",system-ui,sans-serif;
    --font-mincho:"Hiragino Mincho ProN","Yu Mincho","Noto Serif JP",serif;
    --font-num:"Cormorant Garamond","Iowan Old Style",Georgia,serif;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--font-ui);font-size:15px;line-height:1.65;
       padding:0 0 80px;-webkit-font-smoothing:antialiased}
  a{color:inherit}
  .wrap{max-width:680px;margin:0 auto;padding:0 18px}

  header{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;max-width:680px;margin:0 auto}
  .brand{display:inline-flex;align-items:center;gap:9px;text-decoration:none;font-weight:700;font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-2)}
  .brand .mark{width:26px;height:26px;background:var(--red);color:#fff;display:inline-flex;align-items:center;justify-content:center;border-radius:5px;font-family:var(--font-num);font-style:italic;font-size:17px;transform:rotate(-4deg)}
  .gear{background:none;border:0;font-size:20px;cursor:pointer;color:var(--ink-3);padding:6px}

  h1{font-family:var(--font-mincho);font-size:clamp(26px,5vw,38px);font-weight:400;letter-spacing:.04em;margin:8px 0 2px}
  h1 .dot{color:var(--red);font-family:var(--font-num);font-style:italic}
  .lead{color:var(--ink-3);font-size:13.5px;margin:0 0 18px}

  .card{background:var(--bg-elevated);border:1px solid var(--hair);border-radius:14px;padding:18px;margin-bottom:16px}
  label{display:block;font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-4);margin:0 0 8px}
  input[type=text],input[type=date]{width:100%;font:inherit;padding:11px 13px;border:1px solid var(--rule);border-radius:10px;background:#fff;color:var(--ink)}
  .btn{font:inherit;font-weight:700;padding:12px 20px;border:0;border-radius:10px;background:var(--red);color:#fff;cursor:pointer;transition:background .2s}
  .btn:hover{background:var(--red-bright)} .btn:disabled{opacity:.45;cursor:default}
  .hint{font-size:12px;color:var(--ink-3);margin:8px 0 0;line-height:1.6}

  /* onboarding */
  #setup{display:none}
  .types{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
  .type{border:1px solid var(--rule);background:#fff;border-radius:12px;padding:13px;text-align:left;cursor:pointer;font:inherit;transition:border-color .15s}
  .type:hover{border-color:var(--red)}
  .type.on{border-color:var(--red);background:var(--red-soft)}
  .type:disabled{opacity:.5;cursor:default}
  .type:disabled:hover{border-color:var(--rule)}
  .type .t-name{font-weight:700;font-size:15px}
  .type .t-sub{font-size:11.5px;color:var(--ink-3);margin-top:2px;display:block}
  .chips{display:flex;gap:8px;flex-wrap:wrap}
  .chip{font:inherit;font-size:13px;font-weight:700;border:1px solid var(--rule);background:#fff;color:var(--ink-3);border-radius:20px;padding:7px 15px;cursor:pointer}
  .chip.on{border-color:var(--red);background:var(--red);color:#fff}

  /* plan view */
  #plan{display:none}
  .scenes{display:flex;gap:8px;flex-wrap:wrap;margin:0 0 18px}
  .scene{font-size:12px;font-weight:700;background:var(--red-soft);color:var(--red-deep);border:1px solid rgba(138,36,56,.22);border-radius:20px;padding:4px 12px}
  .count{display:flex;align-items:baseline;gap:14px;flex-wrap:wrap}
  .count .n{font-family:var(--font-num);font-style:italic;font-size:52px;color:var(--red);line-height:1}
  .count .l{font-size:13px;color:var(--ink-3)}
  .count .d{margin-left:auto;font-size:12px;color:var(--ink-4)}

  .today{background:var(--red);color:#fff;border:0}
  .today .kicker{font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;opacity:.8;margin:0 0 8px}
  .today .task{font-size:17px;font-weight:700;line-height:1.55;margin:0 0 4px}
  .today .why{font-size:12.5px;opacity:.85;margin:0 0 14px}
  .today .go{display:inline-block;background:#fff;color:var(--red-deep);font-weight:700;padding:10px 18px;border-radius:10px;text-decoration:none}
  .today .tiny{display:inline-block;margin-left:12px;font-size:12.5px;color:#fff;opacity:.8;text-decoration:underline}
  .nopressure{font-size:12px;color:var(--ink-4);margin:-6px 0 16px;padding:0 4px}

  .cele{background:rgba(47,124,94,.1);border:1px solid rgba(47,124,94,.35);color:var(--green);border-radius:12px;padding:12px 15px;font-size:14px;font-weight:700;margin-bottom:16px;display:none}

  .phase-head{display:flex;align-items:baseline;gap:10px;margin:0 0 4px}
  .phase-num{font-family:var(--font-num);font-style:italic;font-size:24px;color:var(--red)}
  .phase-title{font-weight:700;font-size:16px}
  .phase-when{margin-left:auto;font-size:11.5px;color:var(--ink-4)}
  .phase-desc{font-size:12.5px;color:var(--ink-3);margin:0 0 12px}
  .item{display:flex;align-items:center;gap:11px;padding:11px 0;border-top:1px solid var(--hair)}
  .item .st{flex-shrink:0;width:40px;text-align:center;font-size:12px;font-weight:700;color:var(--ink-4)}
  .item.done .st{color:var(--green);font-size:16px}
  .item .lb{flex:1;min-width:0;font-size:14px;color:var(--ink-2)}
  .item.done .lb{color:var(--ink-4);text-decoration:line-through;text-decoration-color:rgba(47,124,94,.5)}
  .item a.jump{flex-shrink:0;font-size:12px;font-weight:700;color:var(--red);text-decoration:none}
  .item .act{flex-shrink:0;font:inherit;font-size:12.5px;font-weight:700;border:1px solid var(--rule);background:#fff;color:var(--ink-3);border-radius:8px;padding:5px 11px;cursor:pointer}
  .item .act:hover{border-color:var(--red);color:var(--red)}
  .item.done .act{border-color:var(--green);color:var(--green);background:rgba(47,124,94,.06)}
  .bar{height:4px;background:var(--bg-deep);border-radius:4px;overflow:hidden;margin-top:5px}
  .bar i{display:block;height:100%;background:var(--red);border-radius:4px;transition:width .4s}
  .item.done .bar i{background:var(--green)}

  .week{display:flex;gap:10px;flex-wrap:wrap}
  .wk{background:var(--bg-tile);border-radius:10px;padding:10px 14px;font-size:13px;color:var(--ink-2)}
  .wk b{font-family:var(--font-num);font-style:italic;font-size:20px;color:var(--red);margin-right:3px}
  .ach{display:flex;align-items:baseline;gap:10px;padding:8px 0;border-top:1px solid var(--hair);font-size:13.5px}
  .ach:first-of-type{border-top:0}
  .ach .d{flex-shrink:0;font-family:var(--font-num);font-style:italic;font-size:12px;color:var(--ink-4)}
  .ach .t{color:var(--ink-2)}
  .ach-empty{font-size:13px;color:var(--ink-4)}

  .foot{font-size:12px;color:var(--ink-4);line-height:1.7;margin-top:4px}
</style>
</head>
<body>
<header>
  <a class="brand" href="index.html"><span class="mark">&amp;</span> 日々</a>
  <button class="gear" id="gearBtn" title="⚙" aria-label="⚙" style="display:none">⚙</button>
</header>

<div class="wrap">

  <!-- ===== onboarding ===== -->
  <div id="setup">
    <h1 id="suH1"></h1>
    <p class="lead" id="suLead"></p>

    <div class="card">
      <label id="q0Label"></label>
      <div class="types" id="targetSel"></div>
    </div>

    <div class="card">
      <label id="q1Label"></label>
      <div class="types" id="typeSel"></div>
      <p class="hint" id="typeHint" style="display:none"></p>
    </div>

    <div class="card" id="sceneCard" style="display:none">
      <label id="q2Label"></label>
      <div class="chips" id="sceneSel"></div>
    </div>

    <div class="card">
      <label id="q3Label"></label>
      <input type="date" id="deadline">
      <label style="margin-top:14px" id="q4Label"></label>
      <input type="text" id="goalTitle">
      <div style="margin-top:16px">
        <button class="btn" id="buildBtn" disabled></button>
      </div>
      <p class="hint" id="buildHint"></p>
    </div>
  </div>

  <!-- ===== plan ===== -->
  <div id="plan">
    <h1 id="planH1"></h1>
    <p class="lead" id="planLead"></p>
    <div class="scenes" id="planScenes"></div>

    <div class="card">
      <div class="count">
        <span class="n" id="days">--</span>
        <span class="l" id="daysLabel"></span>
        <span class="d" id="doneCount"></span>
      </div>
    </div>

    <div class="cele" id="cele"></div>

    <div class="card today">
      <p class="kicker" id="todayKicker"></p>
      <p class="task" id="todayTask">…</p>
      <p class="why" id="todayWhy"></p>
      <a class="go" id="todayGo" href="#"></a>
      <a class="tiny" id="todayTiny" href="#"></a>
    </div>
    <p class="nopressure" id="noPressure"></p>

    <div id="phases"></div>

    <div class="card">
      <label id="weekLabel"></label>
      <div class="week" id="week"></div>
    </div>

    <div class="card">
      <label id="achLabel"></label>
      <div id="achList"></div>
    </div>

    <p class="foot" id="foot"></p>
  </div>
</div>

    const parts = {
      daily: s => ({ label:fmt(P.daily_l,{tool:m.daily.name, lv:m.daily.lvName[s]}), link:m.daily.href,
                     prog:()=>({n:dailyDone(m.daily.key, m.daily.lv[s]), t:3}),
                     task:fmt(P.daily_t,{tool:m.daily.name, lv:m.daily.lvName[s]}), why:P.daily_w[s] }),
      writer: n => ({ label:fmt(P.writer_l,{n}), link:m.writer, prog:cap(()=>writerWins(tg),n), task:P.writer_t, why:P.writer_w }),
      reader: n => ({ label:fmt(P.reader_l,{n}), link:m.reader, prog:cap(readerUses,n), task:P.reader_t, why:P.reader_w }),
      dict:   n => ({ label:fmt(P.dict_l,{n}), link:m.reader, prog:cap(()=>dictCount(m.dictKey,tg),n), task:P.dict_t, why:P.dict_w }),
      daily7: () => ({ label:P.daily7_l, link:m.writer, self:'count', key:'daily7', prog:cap(()=>counter(tg,'daily7'),7), task:P.daily7_t, why:P.daily7_w })
    };
    if(m.listen){
      const L = m.listen;
      parts.listen = (kindIdx, n) => ({ label:fmt(P.listen_l,{tool:L.name, lv:L.lvName[kindIdx], n}), link:L.href,
                                        prog:cap(()=>listenBest(L.bestKey, L.kinds[kindIdx]),n),
                                        task:fmt(P.listen_t,{tool:L.name, lv:L.lvName[kindIdx], n}), why:P.listen_w });
      parts.listen12 = () => ({ label:fmt(P.listen12_l,{tool:L.name, a:L.lvName[0], b:L.lvName[1]}), link:L.href,
                                prog:cap(()=>Math.max(listenBest(L.bestKey,L.kinds[0]),listenBest(L.bestKey,L.kinds[1])),9),
                                task:fmt(P.listen_t,{tool:L.name, lv:L.lvName[0]+'/'+L.lvName[1], n:9}), why:P.listen12_w });
      parts.shadow = n => ({ label:fmt(P.shadow_l,{n}), link:m.listen.href, self:'count', key:'shadow',
                             prog:cap(()=>counter(tg,'shadow'),n), task:fmt(P.shadow_t,{tool:m.listen.name}), why:P.shadow_w });
    }
    return parts;
  }
  function missionItems(tg, scenes){
    const m = TM(tg), out = [];
    (scenes||[]).forEach(s=> (T.missions[s]||[]).forEach(def=> out.push({
      label:def[1], link:m.writer, self:'check', key:def[0],
      prog:()=>({n:checked(tg,def[0])?1:0, t:1}), task:def[2], why:T.p.mission_w
    })));
    return out;
  }

  /* ================= plans ================= */
  function buildPlan(g){
    const F = buildParts(g.target);
    const M = missionItems(g.target, g.scenes);
    const L = !!TM(g.target).listen;
    if(g.type==='listen' && L) return [
      [F.daily(0), F.listen(0,8), F.shadow(10)],
      [F.daily(1), F.listen(1,8), F.shadow(30)],
      [F.listen(2,7), F.reader(5), F.shadow(50)],
      [F.listen12(), TM(g.target).listen.kinds[3] ? F.listen(3,6) : F.listen(2,8)]
    ];
    if(g.type==='read') return [
      [F.daily(0), F.dict(10), F.reader(5)],
      [F.daily(1), F.reader(15), F.dict(25)],
      [F.daily(2), F.reader(30), F.writer(5)],
      [F.dict(50), F.reader(50)]
    ];
    if(g.type==='write') return [
      [F.daily(0), F.writer(5), F.dict(10)],
      [F.daily(1), F.writer(15), L?F.listen(0,8):F.dict(25)],
      [...M, F.writer(25), F.reader(5)],
      [F.writer(40), F.daily7()]
    ];
    // talk（要listening）
    return [
      [F.daily(0), F.listen(0,8), F.shadow(10)],
      [F.daily(1), F.listen(1,8), F.writer(10), F.shadow(30)],
      [...M, F.reader(5), F.listen(2,7)],
      [F.listen12(), F.writer(25), F.daily7()]
    ];
  }
  const typeAvailable = (tg, type) => (type==='read'||type==='write') ? true : !!TM(tg).listen;

  /* ================= onboarding ================= */
  let selTarget = null, selType = null, selScenes = [];
  function initSetupText(){
    $('suH1').innerHTML = esc(T.su_h1)+'<span class="dot">.</span>';
    $('suLead').textContent = T.su_lead;
    $('q0Label').textContent = T.q0; $('q1Label').textContent = T.q1; $('q2Label').textContent = T.q2;
    $('q3Label').textContent = T.q3; $('q4Label').textContent = T.q4;
    $('buildBtn').textContent = T.build; $('buildHint').textContent = T.build_hint;
    $('targetSel').innerHTML = TARGETS.map(tg=>`<button class="type" data-target="${tg}"><span class="t-name">${T.targets[tg]}</span></button>`).join('');
    $('typeSel').innerHTML = ['talk','listen','read','write'].map(ty=>`<button class="type" data-type="${ty}"><span class="t-name">${T.types[ty][0]}</span><span class="t-sub">${T.types[ty][1]}</span></button>`).join('');
    $('sceneSel').innerHTML = Object.keys(T.scenes).map(s=>`<button class="chip" data-scene="${s}">${T.scenes[s]}</button>`).join('');
    document.querySelectorAll('[data-target]').forEach(b=> b.addEventListener('click', ()=>{ selTarget=b.dataset.target; refreshSetup(); }));
    document.querySelectorAll('[data-type]').forEach(b=> b.addEventListener('click', ()=>{ if(!b.disabled){ selType=b.dataset.type; refreshSetup(); } }));
    document.querySelectorAll('[data-scene]').forEach(b=> b.addEventListener('click', ()=>{
      const s=b.dataset.scene;
      selScenes = selScenes.includes(s) ? selScenes.filter(x=>x!==s) : [...selScenes, s];
      refreshSetup();
    }));
  }
  function refreshSetup(){
    document.querySelectorAll('[data-target]').forEach(b=> b.classList.toggle('on', b.dataset.target===selTarget));
    let naShown = false;
    document.querySelectorAll('[data-type]').forEach(b=>{
      const ok = selTarget ? typeAvailable(selTarget, b.dataset.type) : true;
      b.disabled = !ok;
      if(!ok){ naShown = true; if(selType===b.dataset.type) selType=null; }
      b.classList.toggle('on', b.dataset.type===selType);
    });
    $('typeHint').style.display = naShown ? 'block' : 'none';
    $('typeHint').textContent = T.na;
    $('sceneCard').style.display = (selType==='talk'||selType==='write') ? 'block' : 'none';
    document.querySelectorAll('[data-scene]').forEach(b=> b.classList.toggle('on', selScenes.includes(b.dataset.scene)));
    $('buildBtn').disabled = !(selTarget && selType && $('deadline').value);
  }
  $('deadline').addEventListener('change', refreshSetup);
  $('buildBtn').addEventListener('click', ()=>{
    const g = {
      ui: UI,
      target: selTarget,
      type: selType,
      scenes: (selType==='talk'||selType==='write') ? selScenes : [],
      title: $('goalTitle').value.trim(),
      deadline: $('deadline').value,
      createdAt: goal()?.createdAt || Date.now(),
      doneIds: [], ach: goal()?.ach || []
    };
    saveGoal(g);
    show();
  });

  /* ================= plan rendering ================= */
  function daysLeft(dl){
    const t = new Date(); t.setHours(0,0,0,0);
    return Math.max(0, Math.ceil((new Date(dl+'T00:00:00') - t) / 86400000));
  }
  function fmtMD(d){ return (d.getMonth()+1)+'/'+d.getDate(); }
  function phaseWhen(g, pi){
    const a = new Date(g.createdAt), b = new Date(g.deadline+'T00:00:00');
    if(b<=a) return '';
    return fmt(T.when, { d: fmtMD(new Date(a.getTime()+((b-a)/4)*(pi+1))) });
  }
  const itemId = it => it.key || it.label;
  const isDone = it => { const p=it.prog(); return p.n>=p.t; };

  function renderPlan(){
    const g = goal(); if(!g) return;
    const phases = buildPlan(g);
    const meta = T.phase[g.type] || T.phase.talk;
    const flat = phases.flat();
    const m = TM(g.target);

    $('planH1').innerHTML = esc(g.title || fmt(T.plan_h1, {target:T.targets[g.target], type:T.type_name[g.type]})) + '<span class="dot">.</span>';
    $('planLead').textContent = fmt(T.plan_lead, {dl: g.deadline.replace(/-/g,'/')});
    $('planScenes').innerHTML = ['<span class="scene">'+T.targets[g.target]+'</span>','<span class="scene">'+T.type_name[g.type]+'</span>']
      .concat((g.scenes||[]).map(s=>'<span class="scene">'+T.scenes[s]+'</span>')).join('');

    $('days').textContent = daysLeft(g.deadline);
    $('daysLabel').textContent = T.days_label;
    const doneItems = flat.filter(isDone);
    $('doneCount').textContent = fmt(T.cp, {a:doneItems.length, b:flat.length});

    // 新規達成 → できたリスト＋お祝い
    const prevDone = new Set(g.doneIds||[]);
    const newly = doneItems.filter(it=>!prevDone.has(itemId(it)));
    if(newly.length && prevDone.size + newly.length === doneItems.length){
      const today = LC.dateStr();
      newly.forEach(it=> g.ach.push({ t: it.label, d: today }));
      $('cele').style.display='block';
      $('cele').textContent = T.cele + newly.map(it=>it.label).join(' ／ ');
    }
    g.doneIds = doneItems.map(itemId); saveGoal(g);

    // 今日はこれ
    $('todayKicker').textContent = T.today;
    $('todayGo').textContent = T.open;
    const next = flat.find(it=>!isDone(it));
    if(next){
      $('todayTask').textContent = next.task;
      $('todayWhy').textContent = next.why||'';
      $('todayGo').href = next.link;
    } else {
      $('todayTask').textContent = T.alldone;
      $('todayWhy').textContent = '';
      $('todayGo').href = m.writer;
    }
    if(m.listen){ $('todayTiny').textContent = T.tiny_listen; $('todayTiny').href = m.listen.href + (m.listen.href.includes('?')?'&':'?') + 'n=3'; }
    else { $('todayTiny').textContent = T.tiny_reader; $('todayTiny').href = m.reader; }
    $('noPressure').textContent = T.nopressure;

    // フェーズ
    $('phases').innerHTML = phases.map((items,pi)=>{
      const rows = items.map(it=>{
        const pr = it.prog(); const done = pr.n>=pr.t;
        const stat = done ? '✓' : (pr.t>1 ? pr.n+'/'+pr.t : '・');
        let act='';
        if(it.self==='count') act = `<button class="act" data-bump="${it.key}">${done?T.done_btn:T.plus1}</button>`;
        if(it.self==='check') act = `<button class="act" data-check="${it.key}">${done?T.checked_btn:T.check_btn}</button>`;
        return `<div class="item ${done?'done':''}">
          <span class="st">${stat}</span>
          <span class="lb">${esc(it.label)}${pr.t>1?`<span class="bar"><i style="width:${Math.round(pr.n/pr.t*100)}%"></i></span>`:''}</span>
          ${act}
          <a class="jump" href="${it.link}">${T.jump}</a>
        </div>`;
      }).join('');
      return `<div class="card">
        <div class="phase-head"><span class="phase-num">${T.nums[pi]}</span><span class="phase-title">${meta[pi][0]}</span><span class="phase-when">${phaseWhen(g,pi)}</span></div>
        <p class="phase-desc">${meta[pi][1]}</p>
        ${rows}
      </div>`;
    }).join('');
    document.querySelectorAll('[data-bump]').forEach(b=> b.addEventListener('click', ()=>{ bump(g.target, b.dataset.bump, 1); renderPlan(); }));
    document.querySelectorAll('[data-check]').forEach(b=> b.addEventListener('click', ()=>{ toggleCheck(g.target, b.dataset.check); renderPlan(); }));

    // 今週の自分
    $('weekLabel').textContent = T.week;
    let wins=[]; try{ wins = LC.getWins(); }catch{}
    const wk = Date.now()-7*86400000;
    const week = wins.filter(w=>w.at>=wk && w.lang===g.target);
    const c = s => week.filter(w=>w.skill===s).length;
    const partsHtml = [];
    if(c('聞')) partsHtml.push('<div class="wk"><b>'+c('聞')+'</b>'+T.w_listen+'</div>');
    if(c('書')) partsHtml.push('<div class="wk"><b>'+c('書')+'</b>'+T.w_write+'</div>');
    if(c('読')) partsHtml.push('<div class="wk"><b>'+c('読')+'</b>'+T.w_read+'</div>');
    $('week').innerHTML = partsHtml.join('') || '<p class="ach-empty">'+T.week_empty+'</p>';

    // できるようになったこと
    $('achLabel').textContent = T.ach;
    const ach = (g.ach||[]).slice().reverse();
    $('achList').innerHTML = ach.length
      ? ach.map(a=>`<div class="ach"><span class="d">${a.d.slice(5).replace('-','/')}</span><span class="t">${esc(a.t)}</span></div>`).join('')
      : '<p class="ach-empty">'+T.ach_empty+'</p>';
    $('foot').textContent = T.foot;
  }

  /* ================= view switching ================= */
  function show(){
    const g = goal();
    // この目標の学習言語を今のUIが扱えない場合（例：中国語の目標を中文UIで開いた）、
    // 目標を作ったチャンネルのUIに切り替えて表示する（白画面クラッシュ防止）
    if(g && !TOOLMAP[UI][g.target]){
      const own = (g.ui && TOOLMAP[g.ui] && TOOLMAP[g.ui][g.target]) ? g.ui
                : ['ja','ko','zh'].find(u => TOOLMAP[u] && TOOLMAP[u][g.target]);
      if(own && own !== UI){
        localStorage.setItem('roadmap-ui', own);
        location.replace('roadmap.html?lang='+own);
        return;
      }
    }
    $('setup').style.display = g ? 'none' : 'block';
    $('plan').style.display = g ? 'block' : 'none';
    $('gearBtn').style.display = g ? 'block' : 'none';
    if(g) renderPlan();
    else {
      if(!$('deadline').value){
        const d = new Date(Date.now()+70*86400000);
        $('deadline').value = d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
      }
      if(TARGETS.length===1) selTarget = TARGETS[0];
      refreshSetup();
    }
  }
  $('gearBtn').addEventListener('click', ()=>{
    const g = goal();
    if(g){ selTarget=g.target; selType=g.type; selScenes=g.scenes||[]; $('deadline').value=g.deadline; $('goalTitle').value=g.title||''; }
    $('plan').style.display='none'; $('setup').style.display='block'; $('gearBtn').style.display='none';
    refreshSetup();
    window.scrollTo({top:0});
  });
  initSetupText();
  show();
</script>
</body>
</html>
