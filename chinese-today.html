<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>今日の一句 · 中文 — One a Day</title>
<link rel="icon" type="image/svg+xml" href="favicon-zh.svg">
<link rel="apple-touch-icon" href="icons/favicon-180.png">
<meta name="theme-color" content="#984a2e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="今日の一句 中文">
<script>
  (function() {
    var stored = localStorage.getItem('today-zh-theme');
    if (stored === 'dark') document.documentElement.classList.add('dark');
    else if (!stored && window.matchMedia('(prefers-color-scheme: dark)').matches) {
      document.documentElement.classList.add('dark');
    }
  })();
</script>
<style>
  :root {
    --bg: #f4f0e6;
    --bg-elevated: #faf7ee;
    --bg-card: #ffffff;
    --bg-subtle: #ebe4d2;
    --bg-deeper: #e4dbc4;

    --ink: #1a1611;
    --ink-2: #4a4239;
    --ink-3: #82786b;
    --ink-4: #b3a78f;
    --ink-5: #d5cbb8;

    --accent: #984a2e;
    --accent-2: #7a3a23;
    --accent-soft: #f1e1d7;
    --accent-glow: rgba(152, 74, 46, 0.10);

    --gold: #b6843a;
    --gold-soft: rgba(182, 132, 58, 0.14);

    --teal: #3a7d6f;
    --teal-soft: rgba(58, 125, 111, 0.12);

    --border: #e0d6bd;
    --border-strong: #cdc1a3;
    --divider: #e8e0c8;

    --good: #3a7d52;
    --good-soft: rgba(58, 125, 82, 0.14);
    --warn: #c98624;
    --warn-soft: rgba(201, 134, 36, 0.14);
    --bad: #b8442a;
    --bad-soft: rgba(184, 68, 42, 0.12);

    --shadow-sm: 0 1px 2px rgba(26, 22, 17, 0.04);
    --shadow: 0 1px 3px rgba(26, 22, 17, 0.04), 0 4px 16px rgba(26, 22, 17, 0.05);
    --shadow-lg: 0 4px 16px rgba(26, 22, 17, 0.06), 0 24px 56px rgba(26, 22, 17, 0.08);

    --ease: cubic-bezier(0.2, 0, 0.2, 1);
    --ease-spring: cubic-bezier(0.34, 1.4, 0.5, 1);

    --font-ui: -apple-system, BlinkMacSystemFont, "Inter", "SF Pro Text",
               "Hiragino Sans", "Yu Gothic UI", system-ui, sans-serif;
    --font-display: "SF Pro Display", "Inter", -apple-system, system-ui, sans-serif;
    --font-zh: "PingFang SC", "Hiragino Sans GB", "Source Han Sans SC",
               "Noto Sans SC", "Microsoft YaHei", sans-serif;
    --font-zh-serif: "Songti SC", "STSong", "Source Han Serif SC",
                     "Noto Serif SC", serif;
    --font-num: "Cormorant Garamond", "Iowan Old Style", Georgia, serif;
    --font-mono: "SF Mono", "JetBrains Mono", "Menlo", monospace;
  }

  html.dark {
    --bg: #14110d;
    --bg-elevated: #1c1813;
    --bg-card: #1f1b16;
    --bg-subtle: #25201a;
    --bg-deeper: #2c2620;

    --ink: #f1ebde;
    --ink-2: #cdc2b1;
    --ink-3: #938874;
    --ink-4: #5e5447;
    --ink-5: #3a342b;

    --accent: #d97757;
    --accent-2: #e08670;
    --accent-soft: rgba(217, 119, 87, 0.14);
    --accent-glow: rgba(217, 119, 87, 0.22);

    --gold: #e6b860;
    --gold-soft: rgba(230, 184, 96, 0.14);

    --teal: #6dc9b6;
    --teal-soft: rgba(109, 201, 182, 0.14);

    --border: #2e2820;
    --border-strong: #3d3528;
    --divider: #28221a;

    --good: #6dc996;
    --good-soft: rgba(109, 201, 150, 0.14);
    --warn: #f0bb6a;
    --warn-soft: rgba(240, 187, 106, 0.14);
    --bad: #ec8b73;
    --bad-soft: rgba(236, 139, 115, 0.14);

    --shadow-sm: 0 1px 2px rgba(0,0,0,0.4);
    --shadow: 0 1px 3px rgba(0,0,0,0.3), 0 4px 16px rgba(0,0,0,0.2);
    --shadow-lg: 0 8px 24px rgba(0,0,0,0.4), 0 28px 56px rgba(0,0,0,0.3);
  }

  * { box-sizing: border-box; }
  *:focus { outline: none; }
  *:focus-visible {
    outline: 1.5px solid var(--accent);
    outline-offset: 3px;
    border-radius: 4px;
  }

  html {
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
  }

  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: var(--font-ui);
    font-size: 15px;
    line-height: 1.6;
    letter-spacing: -0.003em;
    min-height: 100vh;
    min-height: 100dvh;
    transition: background 320ms var(--ease), color 320ms var(--ease);
    padding-bottom: calc(env(safe-area-inset-bottom) + 90px);
  }

  ::selection { background: var(--accent); color: #fff; }

  input, textarea, button { font-family: inherit; color: inherit; }

  /* ============ TOPBAR ============ */
  .topbar {
    position: sticky;
    top: 0;
    z-index: 50;
    background: color-mix(in srgb, var(--bg) 92%, transparent);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 14px 22px;
    padding-top: calc(14px + env(safe-area-inset-top));
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .brand {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
    color: var(--ink-2);
    font-family: var(--font-display);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.20em;
    text-transform: uppercase;
  }
  .brand-mark {
    width: 28px; height: 28px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: var(--accent);
    color: #fff;
    font-family: var(--font-zh-serif);
    font-size: 15px;
    border-radius: 4px;
    transform: rotate(-4deg);
    box-shadow: 0 4px 14px var(--accent-glow);
    transition: transform 280ms var(--ease);
  }
  .brand:hover .brand-mark { transform: rotate(0) scale(1.08); }
  .brand-text { line-height: 1; }
  .brand-sep { color: var(--ink-4); margin: 0 6px; }

  .topbar-actions { display: flex; gap: 8px; align-items: center; }
  .icon-btn {
    width: 36px; height: 36px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--bg-elevated);
    color: var(--ink-2);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 220ms var(--ease);
  }
  .icon-btn:hover { color: var(--accent); border-color: var(--accent); }
  .icon-btn svg { width: 14px; height: 14px; }
  html.dark .icon-btn .moon { display: none; }
  html.dark .icon-btn .sun { display: block; }
  html:not(.dark) .icon-btn .sun { display: none; }
  html:not(.dark) .icon-btn .moon { display: block; }

  /* ============ STATS BAR ============ */
  .stats-bar {
    max-width: 720px;
    margin: 28px auto 0;
    padding: 0 22px;
    display: flex;
    justify-content: flex-start;
    align-items: baseline;
    gap: 28px;
    flex-wrap: wrap;
  }
  .stat { display: flex; align-items: baseline; gap: 7px; }
  .stat-num {
    font-family: var(--font-num);
    font-style: italic;
    font-size: 28px;
    line-height: 1;
    font-weight: 500;
  }
  .stat-num.streak { color: var(--accent); }
  .stat-num.stock { color: var(--gold); }
  .stat-num.due { color: var(--teal); }
  .stat-lbl {
    font-family: var(--font-display);
    font-size: 9.5px;
    font-weight: 700;
    letter-spacing: 0.20em;
    text-transform: uppercase;
    color: var(--ink-3);
  }

  /* ============ CARD ============ */
  .card-wrap {
    max-width: 720px;
    margin: 22px auto;
    padding: 0 22px;
  }
  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 14px;
    box-shadow: var(--shadow);
    padding: 36px 32px 28px;
    position: relative;
    overflow: hidden;
    animation: cardIn 600ms var(--ease-spring);
  }
  .card.is-builtin::before {
    background: linear-gradient(90deg, var(--teal) 0%, var(--gold) 100%);
  }
  .card.is-user::before {
    background: linear-gradient(90deg, var(--accent) 0%, var(--gold) 100%);
  }
  .card::before {
    content: "";
    position: absolute;
    inset: 0 0 auto 0;
    height: 3px;
  }
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @media (max-width: 600px) {
    .card { padding: 28px 20px 22px; border-radius: 12px; }
  }

  .card-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    font-family: var(--font-display);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.20em;
    text-transform: uppercase;
    color: var(--ink-3);
    margin-bottom: 24px;
    flex-wrap: wrap;
  }
  .source-chip {
    padding: 4px 10px;
    border-radius: 999px;
    letter-spacing: 0.16em;
  }
  .source-chip.user { background: var(--accent-soft); color: var(--accent-2); }
  .source-chip.builtin { background: var(--teal-soft); color: var(--teal); }
  html.dark .source-chip.user { color: var(--accent); }

  .type-chip {
    padding: 3px 8px;
    border-radius: 4px;
    border: 1px solid var(--border);
    color: var(--ink-3);
    letter-spacing: 0.16em;
  }

  .quiz-text {
    font-family: var(--font-zh-serif);
    font-size: clamp(28px, 6vw, 40px);
    line-height: 1.4;
    color: var(--ink);
    margin: 0 0 18px;
    letter-spacing: 0.02em;
    font-weight: 500;
    word-break: break-word;
  }
  .quiz-hint {
    color: var(--ink-3);
    font-size: 13px;
    margin: 14px 0 0;
    font-style: italic;
  }

  .reveal-zone {
    margin-top: 18px;
    border-top: 1px dashed var(--border);
    padding-top: 18px;
    display: none;
  }
  .reveal-zone.open { display: block; }
  .reveal-row {
    display: grid;
    grid-template-columns: 64px 1fr;
    gap: 10px 16px;
    align-items: baseline;
    margin-bottom: 12px;
  }
  .reveal-label {
    font-family: var(--font-display);
    font-size: 9.5px;
    font-weight: 700;
    letter-spacing: 0.20em;
    text-transform: uppercase;
    color: var(--ink-4);
    padding-top: 2px;
  }
  .reveal-val { color: var(--ink-2); font-size: 15.5px; line-height: 1.55; }
  .reveal-val.pinyin { font-family: var(--font-num); font-style: italic; color: var(--ink-3); font-size: 17px; }
  .reveal-val.jp { color: var(--ink-2); }
  .reveal-val.note { color: var(--ink-3); font-size: 14px; border-left: 2px solid var(--gold); padding-left: 12px; }
  .reveal-examples {
    margin: 4px 0 0;
    padding: 0;
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .reveal-examples li {
    padding: 9px 12px;
    background: var(--bg-subtle);
    border-radius: 6px;
    font-size: 13.5px;
  }
  .reveal-examples .ex-zh {
    font-family: var(--font-zh-serif);
    font-size: 16px;
    color: var(--ink);
    margin-right: 10px;
  }
  .reveal-examples .ex-jp {
    color: var(--ink-3);
    font-size: 12.5px;
    display: block;
    margin-top: 2px;
  }

  /* ============ ACTIONS ============ */
  .reveal-btn {
    width: 100%;
    padding: 14px;
    border-radius: 10px;
    background: var(--bg-subtle);
    border: 1px dashed var(--border-strong);
    color: var(--ink-2);
    font-family: var(--font-display);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.20em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 220ms var(--ease);
  }
  .reveal-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--accent-soft);
  }

  .rate-row {
    display: flex;
    gap: 10px;
    margin-top: 24px;
    padding-top: 22px;
    border-top: 1px solid var(--divider);
    flex-wrap: wrap;
  }
  .rate-btn {
    flex: 1;
    min-width: 100px;
    padding: 13px 12px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--bg-elevated);
    color: var(--ink-2);
    cursor: pointer;
    transition: all 220ms var(--ease);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .rate-btn .lbl-jp {
    font-size: 13px;
    font-weight: 600;
  }
  .rate-btn:hover { transform: translateY(-1px); }
  .rate-btn.bad:hover { border-color: var(--bad); color: var(--bad); background: var(--bad-soft); }
  .rate-btn.warn:hover { border-color: var(--warn); color: var(--warn); background: var(--warn-soft); }
  .rate-btn.good:hover { border-color: var(--good); color: var(--good); background: var(--good-soft); }
  .rate-btn .interval {
    font-family: var(--font-display);
    font-size: 9.5px;
    color: var(--ink-4);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .add-stock-row {
    display: flex;
    gap: 10px;
    margin-top: 24px;
    padding-top: 22px;
    border-top: 1px solid var(--divider);
    flex-wrap: wrap;
  }
  .stock-btn {
    flex: 1;
    min-width: 130px;
    padding: 13px 16px;
    border-radius: 10px;
    font-family: var(--font-display);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 220ms var(--ease);
  }
  .stock-btn.add {
    background: var(--accent);
    color: #fff;
    border: 1px solid var(--accent);
    box-shadow: 0 6px 18px var(--accent-glow);
  }
  .stock-btn.add:hover { background: var(--accent-2); }
  .stock-btn.skip {
    background: var(--bg-elevated);
    color: var(--ink-3);
    border: 1px solid var(--border);
  }
  .stock-btn.skip:hover { color: var(--accent); border-color: var(--accent); }

  .done-message {
    text-align: center;
    padding: 24px 0;
    color: var(--ink-3);
    font-size: 14px;
  }
  .done-message .accent { color: var(--accent); font-weight: 700; }

  /* ============ COLLECTION ============ */
  .col-section {
    max-width: 720px;
    margin: 40px auto 0;
    padding: 0 22px;
  }
  .col-head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 18px;
    gap: 12px;
    flex-wrap: wrap;
  }
  .col-title {
    font-family: var(--font-display);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--ink-2);
  }
  .col-title .count {
    color: var(--accent);
    font-family: var(--font-num);
    font-style: italic;
    font-size: 20px;
    margin-left: 4px;
    letter-spacing: 0;
  }
  .col-filters { display: flex; gap: 6px; }
  .filter-chip {
    background: none;
    border: 1px solid var(--border);
    padding: 5px 11px;
    border-radius: 999px;
    color: var(--ink-3);
    font-family: var(--font-display);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 200ms var(--ease);
  }
  .filter-chip:hover { color: var(--accent); border-color: var(--accent); }
  .filter-chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  .col-list { display: flex; flex-direction: column; gap: 8px; }
  .col-item {
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 14px;
    cursor: pointer;
    transition: all 200ms var(--ease);
  }
  .col-item:hover { border-color: var(--accent); transform: translateX(2px); }
  .col-item-type {
    width: 28px; height: 28px;
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-zh-serif);
    font-size: 13px;
    color: var(--ink-3);
    background: var(--bg-subtle);
    flex-shrink: 0;
  }
  .col-item.word .col-item-type { background: var(--accent-soft); color: var(--accent-2); }
  .col-item.grammar .col-item-type { background: var(--gold-soft); color: var(--gold); }
  .col-item.sentence .col-item-type { background: var(--teal-soft); color: var(--teal); }
  html.dark .col-item.word .col-item-type { color: var(--accent); }
  .col-item-body { flex: 1; min-width: 0; }
  .col-item-text {
    font-family: var(--font-zh-serif);
    font-size: 18px;
    color: var(--ink);
    line-height: 1.3;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .col-item-sub {
    font-size: 12px;
    color: var(--ink-3);
    margin-top: 2px;
  }
  .col-item-meta {
    font-family: var(--font-display);
    font-size: 9.5px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-4);
    text-align: right;
    flex-shrink: 0;
  }
  .col-item-meta .due { color: var(--teal); }
  .col-item-meta .overdue { color: var(--accent); }

  .col-empty {
    text-align: center;
    padding: 40px 16px;
    color: var(--ink-3);
    background: var(--bg-elevated);
    border-radius: 10px;
    border: 1px dashed var(--border);
  }
  .col-empty-icon {
    font-family: var(--font-zh-serif);
    font-size: 36px;
    color: var(--ink-4);
    margin-bottom: 8px;
  }

  /* ============ FAB ============ */
  .fab {
    position: fixed;
    right: 22px;
    bottom: calc(22px + env(safe-area-inset-bottom));
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background: var(--accent);
    color: #fff;
    border: none;
    cursor: pointer;
    box-shadow: 0 8px 28px var(--accent-glow), 0 2px 8px rgba(0,0,0,0.18);
    font-size: 28px;
    line-height: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 60;
    transition: all 220ms var(--ease);
  }
  .fab:hover {
    background: var(--accent-2);
    transform: translateY(-2px) scale(1.04);
    box-shadow: 0 12px 36px var(--accent-glow), 0 4px 12px rgba(0,0,0,0.22);
  }

  /* ============ MODAL ============ */
  .modal-back {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.55);
    backdrop-filter: blur(4px);
    z-index: 200;
    display: none;
    align-items: flex-end;
    justify-content: center;
    overflow-y: auto;
  }
  @media (min-width: 600px) {
    .modal-back { align-items: center; padding: 50px 16px; }
  }
  .modal-back.open { display: flex; }
  .modal {
    width: 100%;
    max-width: 560px;
    background: var(--bg);
    border-radius: 18px 18px 0 0;
    overflow: hidden;
    box-shadow: var(--shadow-lg);
    position: relative;
    animation: modalUp 380ms var(--ease-spring);
  }
  @media (min-width: 600px) { .modal { border-radius: 16px; } }
  @keyframes modalUp {
    from { transform: translateY(40px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
  .modal-close {
    position: absolute;
    top: 12px;
    right: 12px;
    width: 32px; height: 32px;
    border-radius: 50%;
    background: transparent;
    border: none;
    color: var(--ink-3);
    cursor: pointer;
    z-index: 2;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
  }
  .modal-close:hover { color: var(--accent); background: var(--bg-elevated); }

  .modal-body { padding: 32px 28px 28px; }
  @media (max-width: 600px) { .modal-body { padding: 26px 22px 24px; } }
  .modal-title {
    font-family: var(--font-display);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.24em;
    text-transform: uppercase;
    color: var(--ink-3);
    margin: 0 0 22px;
  }

  /* ============ FORMS ============ */
  .type-row {
    display: flex;
    gap: 8px;
    margin-bottom: 18px;
  }
  .type-pill {
    flex: 1;
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    padding: 10px;
    border-radius: 8px;
    color: var(--ink-3);
    font-size: 13.5px;
    font-weight: 600;
    cursor: pointer;
    transition: all 220ms var(--ease);
  }

/* =====================================================================
   STATE
   ===================================================================== */
const STORAGE_KEY = 'today-zh-state-v2';
const THEME_KEY = 'today-zh-theme';

function defaultState() {
  return {
    collection: [],
    builtinSeen: {},
    todayCardId: null,
    todayDate: null,
    startDate: null,
    lastOpen: null,
    streak: 0
  };
}
function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return defaultState();
    return Object.assign(defaultState(), JSON.parse(raw));
  } catch (e) { return defaultState(); }
}
function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}
function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function daysBetween(aStr, bStr) {
  const a = new Date(aStr + 'T00:00:00');
  const b = new Date(bStr + 'T00:00:00');
  return Math.round((b - a) / 86400000);
}
function addDays(ts, days) { return ts + days * 86400000; }

let state = loadState();
const today = todayStr();

if (!state.startDate) {
  state.startDate = today;
  state.lastOpen = today;
  state.streak = 1;
} else if (state.lastOpen !== today) {
  const diff = daysBetween(state.lastOpen, today);
  if (diff === 1) state.streak += 1;
  else if (diff > 1) state.streak = 1;
  state.lastOpen = today;
  state.todayCardId = null;
  state.todayDate = today;
}
if (state.todayDate !== today) {
  state.todayCardId = null;
  state.todayDate = today;
}
saveState();

/* =====================================================================
   QUIZ PICK LOGIC
   ===================================================================== */
function hashStr(s) {
  let h = 0;
  for (let i = 0; i < s.length; i++) h = ((h << 5) - h + s.charCodeAt(i)) | 0;
  return Math.abs(h);
}

function pickTodayCard() {
  const now = Date.now();
  const due = state.collection
    .filter(c => (c.nextDueAt || 0) <= now)
    .sort((a, b) => (a.nextDueAt || 0) - (b.nextDueAt || 0));
  if (due.length > 0) return { source: 'user', card: due[0] };
  const unseen = BUILTIN_POOL.filter(b => !state.builtinSeen[b.id] && !state.collection.some(c => c.id === b.id));
  if (unseen.length > 0) {
    const idx = hashStr(state.todayDate || today) % unseen.length;
    return { source: 'builtin', card: unseen[idx] };
  }
  if (state.collection.length > 0) {
    const oldest = [...state.collection].sort((a, b) => (a.lastReviewedAt || 0) - (b.lastReviewedAt || 0))[0];
    return { source: 'user', card: oldest };
  }
  return null;
}

function getOrPickTodayCard() {
  if (state.todayCardId) {
    const found = state.collection.find(c => c.id === state.todayCardId);
    if (found) return { source: 'user', card: found };
    const b = BUILTIN_POOL.find(b => b.id === state.todayCardId);
    if (b) return { source: 'builtin', card: b };
  }
  const picked = pickTodayCard();
  if (picked) {
    state.todayCardId = picked.card.id;
    saveState();
  }
  return picked;
}

/* =====================================================================
   RENDER — Today's card
   ===================================================================== */
const cardEl = document.getElementById('card');

function typeLabel(t) {
  return { word: '単語', grammar: '文法', sentence: 'フレーズ' }[t] || t;
}

function renderCard() {
  const picked = getOrPickTodayCard();
  if (!picked) {
    cardEl.innerHTML = `
      <div class="done-message">
        <p>すべての復習・補充カードが一周しました。<br>
        <span class="accent">＋</span> から新しい学びを足してください。</p>
      </div>
    `;
    cardEl.className = 'card is-user';
    return;
  }
  const { source, card } = picked;
  const isUser = source === 'user';
  cardEl.className = 'card ' + (isUser ? 'is-user' : 'is-builtin');

  const sourceLabel = isUser
    ? `あなたのストック${card.reviewCount ? ` · ${card.reviewCount}回目` : ' · 初回'}`
    : '今日のおすすめ';

  const hasDetail = card.pinyin || card.jp || card.note || (card.examples && card.examples.length);
  const userHasNoDetail = isUser && !hasDetail;

  cardEl.innerHTML = `
    <div class="card-meta">
      <span class="source-chip ${isUser ? 'user' : 'builtin'}">${sourceLabel}</span>
      <span class="type-chip">${typeLabel(card.type)}</span>
    </div>
    <p class="quiz-text">${escapeHtml(card.text)}</p>
    ${userHasNoDetail ? `<p class="quiz-hint">詳細未登録 — タップして書き加えられます</p>` : ''}
    <div class="reveal-zone" id="reveal-zone">${renderRevealRows(card)}</div>
    ${hasDetail ? `<button class="reveal-btn" id="reveal-btn">▾ 意味・例を見る</button>` : ''}
    ${isUser ? renderUserActions(card) : renderBuiltinActions()}
  `;

  if (hasDetail) {
    document.getElementById('reveal-btn').addEventListener('click', () => {
      document.getElementById('reveal-zone').classList.add('open');
      document.getElementById('reveal-btn').style.display = 'none';
    });
  }
  cardEl.querySelectorAll('[data-rate]').forEach(btn => {
    btn.addEventListener('click', () => onRate(card, btn.dataset.rate));
  });
  cardEl.querySelectorAll('[data-stock]').forEach(btn => {
    btn.addEventListener('click', () => onStockChoice(card, btn.dataset.stock));
  });
  if (userHasNoDetail) {
    const qt = cardEl.querySelector('.quiz-text');
    const qh = cardEl.querySelector('.quiz-hint');
    qt.style.cursor = 'pointer';
    qh.style.cursor = 'pointer';
    const open = () => openDetail(card);
    qt.addEventListener('click', open);
    qh.addEventListener('click', open);
  }
}

function renderRevealRows(card) {
  let rows = '';
  if (card.pinyin) rows += `<div class="reveal-row"><span class="reveal-label">読み</span><span class="reveal-val pinyin">${escapeHtml(card.pinyin)}</span></div>`;
  if (card.jp) rows += `<div class="reveal-row"><span class="reveal-label">意味</span><span class="reveal-val jp">${escapeHtml(card.jp)}</span></div>`;
  if (card.note) rows += `<div class="reveal-row"><span class="reveal-label">メモ</span><span class="reveal-val note">${escapeHtml(card.note)}</span></div>`;
  if (card.examples && card.examples.length) {
    rows += `<div class="reveal-row"><span class="reveal-label">例文</span><ul class="reveal-examples">
      ${card.examples.map(ex => `<li><span class="ex-zh">${escapeHtml(ex.cn)}</span><span class="ex-jp">${escapeHtml(ex.jp)}</span></li>`).join('')}
    </ul></div>`;
  }
  return rows;
}

function renderUserActions(card) {
  const cur = card.interval || 1;
  const i_warn = Math.max(2, Math.round(cur * 1.5));
  const i_good = Math.max(3, Math.round(cur * 2.2));
  return `
    <div class="rate-row">
      <button class="rate-btn bad" data-rate="bad">
        <span class="lbl-jp">忘れた</span>
        <span class="interval">+1日</span>
      </button>
      <button class="rate-btn warn" data-rate="warn">
        <span class="lbl-jp">あやふや</span>
        <span class="interval">+${i_warn}日</span>
      </button>
      <button class="rate-btn good" data-rate="good">
        <span class="lbl-jp">覚えた</span>
        <span class="interval">+${i_good}日</span>
      </button>
    </div>
  `;
}

function renderBuiltinActions() {
  return `
    <div class="add-stock-row">
      <button class="stock-btn skip" data-stock="skip">スキップ</button>
      <button class="stock-btn add" data-stock="add">ストックに追加</button>
    </div>
  `;
}

/* =====================================================================
   SR + Stock choice
   ===================================================================== */
function onRate(card, rating) {
  const cur = card.interval || 1;
  let newInterval;
  if (rating === 'bad') newInterval = 1;
  else if (rating === 'warn') newInterval = Math.max(2, Math.round(cur * 1.5));
  else newInterval = Math.max(3, Math.round(cur * 2.2));
  newInterval = Math.min(newInterval, 90);

  card.interval = newInterval;
  card.lastReviewedAt = Date.now();
  card.nextDueAt = addDays(Date.now(), newInterval);
  card.reviewCount = (card.reviewCount || 0) + 1;
  if (rating === 'good') card.correctCount = (card.correctCount || 0) + 1;

  state.todayCardId = null;
  saveState();
  renderCard();
  renderStats();
  renderCollection();
}

function onStockChoice(card, choice) {
  state.builtinSeen[card.id] = true;
  if (choice === 'add') {
    const copy = Object.assign({}, card, {
      source: 'builtin',
      addedAt: Date.now(),
      reviewCount: 0,
      correctCount: 0,
      lastReviewedAt: null,
      nextDueAt: addDays(Date.now(), 1),
      interval: 1
    });
    state.collection.push(copy);
  }
  state.todayCardId = null;
  saveState();
  renderCard();
  renderStats();
  renderCollection();
}

/* =====================================================================
   STATS BAR
   ===================================================================== */
function renderStats() {
  document.getElementById('s-streak').textContent = state.streak;
  document.getElementById('s-stock').textContent = state.collection.length;
  const now = Date.now();
  const due = state.collection.filter(c => (c.nextDueAt || 0) <= now).length;
  document.getElementById('s-due').textContent = due;
}

/* =====================================================================
   COLLECTION
   ===================================================================== */
let currentFilter = 'all';
const filterChips = document.querySelectorAll('.filter-chip');
filterChips.forEach(chip => {
  chip.addEventListener('click', () => {
    filterChips.forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    currentFilter = chip.dataset.filter;
    renderCollection();
  });
});

function typeIcon(t) {
  return { word: '词', grammar: '法', sentence: '句' }[t] || '?';
}

function renderCollection() {
  const list = document.getElementById('c-list');
  document.getElementById('c-count').textContent = state.collection.length;
  const now = Date.now();
  let items = state.collection.slice();

  if (currentFilter === 'due') {
    items = items.filter(c => (c.nextDueAt || 0) <= now);
  } else if (currentFilter === 'mastered') {
    items = items.filter(c => (c.interval || 0) >= 14);
  }

  if (items.length === 0) {
    const msg = currentFilter === 'all'
      ? '<div class="col-empty"><div class="col-empty-icon">空</div>まだストックはありません<br><small>右下の「＋」から学びを追加</small></div>'
      : currentFilter === 'due'
        ? '<div class="col-empty"><div class="col-empty-icon">休</div>今日復習するものはありません</div>'
        : '<div class="col-empty"><div class="col-empty-icon">未</div>習得済み (14日間隔以上) はまだありません</div>';
    list.innerHTML = msg;
    return;
  }

  items.sort((a, b) => {
    const aDue = (a.nextDueAt || 0) <= now;
    const bDue = (b.nextDueAt || 0) <= now;
    if (aDue !== bDue) return aDue ? -1 : 1;
    return (b.addedAt || 0) - (a.addedAt || 0);
  });

  list.innerHTML = items.map(it => {
    const dueState = (it.nextDueAt || 0) <= now;
    const daysLeft = dueState ? 0 : Math.ceil(((it.nextDueAt || 0) - now) / 86400000);
    const meta = dueState
      ? `<span class="overdue">復習</span>`
      : `<span class="due">+${daysLeft}日</span>`;
    const sub = [it.pinyin, it.jp].filter(Boolean).join(' · ');
    return `
      <div class="col-item ${it.type}" data-id="${escapeAttr(it.id)}">
        <div class="col-item-type">${typeIcon(it.type)}</div>
        <div class="col-item-body">
          <div class="col-item-text">${escapeHtml(it.text)}</div>
          ${sub ? `<div class="col-item-sub">${escapeHtml(sub)}</div>` : `<div class="col-item-sub" style="color:var(--ink-4)">詳細未登録</div>`}
        </div>
        <div class="col-item-meta">
          ${meta}
          <div style="margin-top:3px">${it.interval || 1}d</div>
        </div>
      </div>
    `;
  }).join('');

  list.querySelectorAll('.col-item').forEach(el => {
    el.addEventListener('click', () => {
      const id = el.dataset.id;
      const card = state.collection.find(c => c.id === id);
      if (card) openDetail(card);
    });
  });
}

const addBack = document.getElementById('add-back');
const addClose = document.getElementById('add-close');
const addCancel = document.getElementById('add-cancel');
const addSave = document.getElementById('add-save');
const addText = document.getElementById('add-text');
const addPinyin = document.getElementById('add-pinyin');
const addJp = document.getElementById('add-jp');
const addNote = document.getElementById('add-note');
const addExamples = document.getElementById('add-examples');
const addToggle = document.getElementById('add-toggle');
const addDetails = document.getElementById('add-details');
const addMainLabel = document.getElementById('add-main-label');
let currentAddType = 'word';

document.getElementById('fab').addEventListener('click', () => openAdd());
addClose.addEventListener('click', closeAdd);
addCancel.addEventListener('click', closeAdd);
addBack.addEventListener('click', (e) => { if (e.target === addBack) closeAdd(); });
addToggle.addEventListener('click', () => {
  addDetails.classList.toggle('open');
  addToggle.textContent = addDetails.classList.contains('open') ? '▴ 詳細を閉じる' : '▾ 詳細を追加 (任意)';
});

document.querySelectorAll('#type-row .type-pill').forEach(p => {
  p.addEventListener('click', () => {
    document.querySelectorAll('#type-row .type-pill').forEach(x => x.classList.remove('active'));
    p.classList.add('active');
    currentAddType = p.dataset.type;
    addMainLabel.textContent = { word: '単語 (中文)', grammar: '文法ポイント', sentence: 'フレーズ・短文' }[currentAddType];
    addText.placeholder = { word: '把', grammar: 'A 比 B + 形容詞', sentence: '没事 / 算了' }[currentAddType];
  });
});

function openAdd() {
  addText.value = '';
  addPinyin.value = '';
  addJp.value = '';
  addNote.value = '';
  addExamples.value = '';
  addDetails.classList.remove('open');
  addToggle.textContent = '▾ 詳細を追加 (任意)';
  addBack.classList.add('open');
  document.body.style.overflow = 'hidden';
  setTimeout(() => addText.focus(), 200);
}
function closeAdd() {
  addBack.classList.remove('open');
  document.body.style.overflow = '';
}
addSave.addEventListener('click', () => {
  const text = addText.value.trim();
  if (!text) { addText.focus(); return; }
  const examples = parseExamples(addExamples.value);
  const item = {
    id: 'u_' + Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
    type: currentAddType,
    text: text,
    pinyin: addPinyin.value.trim() || undefined,
    jp: addJp.value.trim() || undefined,
    note: addNote.value.trim() || undefined,
    examples: examples.length ? examples : undefined,
    addedAt: Date.now(),
    reviewCount: 0,
    correctCount: 0,
    lastReviewedAt: null,
    nextDueAt: Date.now(),
    interval: 1,
    source: 'user'
  };
  state.collection.push(item);
  saveState();
  closeAdd();
  renderCard();
  renderStats();
  renderCollection();
});

function parseExamples(s) {
  if (!s.trim()) return [];
  return s.split('\n').map(line => line.trim()).filter(Boolean).map(line => {
    const [cn, jp] = line.split('|').map(p => (p || '').trim());
    return { cn: cn || line, jp: jp || '' };
  });
}

/* =====================================================================
   DETAIL MODAL
   ===================================================================== */
const detailBack = document.getElementById('detail-back');
const detailBody = document.getElementById('detail-body');
const detailClose = document.getElementById('detail-close');
detailClose.addEventListener('click', closeDetail);
detailBack.addEventListener('click', (e) => { if (e.target === detailBack) closeDetail(); });

function openDetail(card) {
  const ex = (card.examples || []).map(e => `${e.cn} | ${e.jp || ''}`).join('\n');
  detailBody.innerHTML = `
    <h3 class="modal-title">学びを編集</h3>
    <div class="form-field">
      <label class="form-label">${typeLabel(card.type)}</label>
      <textarea class="form-textarea zh" id="d-text">${escapeHtml(card.text)}</textarea>
    </div>
    <div class="form-field">
      <label class="form-label">読み (ピンイン)</label>
      <input class="form-input small" id="d-pinyin" value="${escapeAttr(card.pinyin || '')}">
    </div>
    <div class="form-field">
      <label class="form-label">意味 (日本語)</label>
      <input class="form-input small" id="d-jp" value="${escapeAttr(card.jp || '')}">
    </div>
    <div class="form-field">
      <label class="form-label">メモ</label>
      <textarea class="form-textarea" id="d-note" style="min-height:54px">${escapeHtml(card.note || '')}</textarea>
    </div>
    <div class="form-field">
      <label class="form-label">例文 (1行=1例 · 中文 | 日本語)</label>
      <textarea class="form-textarea" id="d-examples" style="min-height:60px">${escapeHtml(ex)}</textarea>
    </div>
    <div class="form-actions">
      <button class="form-btn" id="d-cancel">キャンセル</button>
      <button class="form-btn primary" id="d-save">保存</button>
    </div>
    <div class="form-danger-row">
      <button class="form-danger" id="d-delete">このカードを削除</button>
    </div>
  `;
  detailBack.classList.add('open');
  document.body.style.overflow = 'hidden';
  document.getElementById('d-cancel').addEventListener('click', closeDetail);
  document.getElementById('d-save').addEventListener('click', () => {
    card.text = document.getElementById('d-text').value.trim() || card.text;
    card.pinyin = document.getElementById('d-pinyin').value.trim() || undefined;
    card.jp = document.getElementById('d-jp').value.trim() || undefined;
    card.note = document.getElementById('d-note').value.trim() || undefined;
    const exs = parseExamples(document.getElementById('d-examples').value);
    card.examples = exs.length ? exs : undefined;
    saveState();
    closeDetail();
    renderCard();
    renderCollection();
  });
  document.getElementById('d-delete').addEventListener('click', () => {
    if (!confirm('このカードを削除しますか？')) return;
    state.collection = state.collection.filter(c => c.id !== card.id);
    if (state.todayCardId === card.id) state.todayCardId = null;
    saveState();
    closeDetail();
    renderCard();
    renderStats();
    renderCollection();
  });
}
function closeDetail() {
  detailBack.classList.remove('open');
  document.body.style.overflow = '';
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    if (addBack.classList.contains('open')) closeAdd();
    if (detailBack.classList.contains('open')) closeDetail();
  }
});

/* =====================================================================
   THEME
   ===================================================================== */
document.getElementById('theme-toggle').addEventListener('click', () => {
  const dark = document.documentElement.classList.toggle('dark');
  localStorage.setItem(THEME_KEY, dark ? 'dark' : 'light');
});

/* =====================================================================
   UTILS
   ===================================================================== */
function escapeHtml(s) {
  if (s == null) return '';
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function escapeAttr(s) { return escapeHtml(s); }

/* =====================================================================
   INIT
   ===================================================================== */
renderStats();
renderCard();
renderCollection();
</script>
</body>
</html>
