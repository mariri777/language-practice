<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>今日の一句 · 한국어 — One a Day</title>
<link rel="icon" type="image/svg+xml" href="favicon-ko.svg">
<link rel="apple-touch-icon" href="icons/favicon-ko-180.png">
<meta name="theme-color" content="#2d7d6a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="今日の一句 한국어">
<script>
  (function() {
    var stored = localStorage.getItem('today-ko-theme');
    if (stored === 'dark') document.documentElement.classList.add('dark');
    else if (!stored && window.matchMedia('(prefers-color-scheme: dark)').matches) {
      document.documentElement.classList.add('dark');
    }
  })();
</script>
<style>
  :root {
    --bg: #f1ede2;
    --bg-elevated: #f8f4e8;
    --bg-card: #ffffff;
    --bg-subtle: #e6e0cf;
    --bg-deeper: #ddd6c0;

    --ink: #14181a;
    --ink-2: #3a4244;
    --ink-3: #6f7a7c;
    --ink-4: #a5adac;
    --ink-5: #cdd1ca;

    --accent: #2d7d6a;
    --accent-2: #1e5c4e;
    --accent-soft: #d8ebe3;
    --accent-glow: rgba(45, 125, 106, 0.12);

    --gold: #c79a4a;
    --gold-soft: rgba(199, 154, 74, 0.12);

    --border: #ddd5bd;
    --border-strong: #c6bea0;
    --divider: #e3dcc4;

    --good: #b6843a;
    --good-soft: rgba(182, 132, 58, 0.14);

    --shadow-sm: 0 1px 2px rgba(20, 24, 26, 0.04);
    --shadow: 0 1px 3px rgba(20, 24, 26, 0.04), 0 4px 16px rgba(20, 24, 26, 0.05);
    --shadow-lg: 0 4px 16px rgba(20, 24, 26, 0.06), 0 24px 56px rgba(20, 24, 26, 0.08);

    --ease: cubic-bezier(0.2, 0, 0.2, 1);
    --ease-spring: cubic-bezier(0.34, 1.4, 0.5, 1);

    --font-ui: -apple-system, BlinkMacSystemFont, "Inter", "SF Pro Text",
               "Hiragino Sans", "Yu Gothic UI", system-ui, sans-serif;
    --font-display: "SF Pro Display", "Inter", -apple-system, system-ui, sans-serif;
    --font-ko: "Apple SD Gothic Neo", "Pretendard", "Noto Sans KR",
               "Malgun Gothic", sans-serif;
    --font-ko-serif: "Apple SD Gothic Neo", "Source Han Serif K",
                     "Noto Serif KR", "Nanum Myeongjo", serif;
    --font-num: "Cormorant Garamond", "Iowan Old Style", Georgia, serif;
    --font-mono: "SF Mono", "JetBrains Mono", "Menlo", monospace;
  }

  html.dark {
    --bg: #0e1413;
    --bg-elevated: #161d1c;
    --bg-card: #1a2220;
    --bg-subtle: #1f2a27;
    --bg-deeper: #25312d;

    --ink: #e9eee9;
    --ink-2: #c3ccc6;
    --ink-3: #8a948f;
    --ink-4: #545e58;
    --ink-5: #353d39;

    --accent: #59c6a8;
    --accent-2: #74d4bb;
    --accent-soft: rgba(89, 198, 168, 0.14);
    --accent-glow: rgba(89, 198, 168, 0.22);

    --gold: #e0b663;
    --gold-soft: rgba(224, 182, 99, 0.14);

    --border: #25302d;
    --border-strong: #344038;
    --divider: #1f2925;

    --good: #e0b663;
    --good-soft: rgba(224, 182, 99, 0.14);

    --shadow-sm: 0 1px 2px rgba(0,0,0,0.4);
    --shadow: 0 1px 3px rgba(0,0,0,0.3), 0 4px 16px rgba(0,0,0,0.2);
    --shadow-lg: 0 8px 24px rgba(0,0,0,0.4), 0 28px 56px rgba(0,0,0,0.3);
  }

  * { box-sizing: border-box; }
  *:focus { outline: none; }
  *:focus-visible {
    outline: 1.5px solid var(--accent);
    outline-offset: 3px;
    border-radius: 4px;
  }

  html {
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
  }

  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: var(--font-ui);
    font-size: 15px;
    line-height: 1.6;
    letter-spacing: -0.003em;
    min-height: 100vh;
    min-height: 100dvh;
    transition: background 320ms var(--ease), color 320ms var(--ease);
    padding-bottom: env(safe-area-inset-bottom);
  }

  ::selection { background: var(--accent); color: #fff; }

  /* ============ TOPBAR ============ */
  .topbar {
    position: sticky;
    top: 0;
    z-index: 50;
    background: color-mix(in srgb, var(--bg) 92%, transparent);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 14px 22px;
    padding-top: calc(14px + env(safe-area-inset-top));
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .brand {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
    color: var(--ink-2);
    font-family: var(--font-display);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.20em;
    text-transform: uppercase;
  }
  .brand-mark {
    width: 28px; height: 28px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: var(--accent);
    color: #fff;
    font-family: var(--font-ko-serif);
    font-size: 14px;
    font-weight: 500;
    border-radius: 4px;
    transform: rotate(-4deg);
    box-shadow: 0 4px 14px var(--accent-glow);
    transition: transform 280ms var(--ease);
  }
  .brand:hover .brand-mark { transform: rotate(0) scale(1.08); }
  .brand-text { line-height: 1; }
  .brand-sep { color: var(--ink-4); margin: 0 6px; }

  .topbar-actions { display: flex; gap: 8px; align-items: center; }
  .icon-btn {
    width: 36px; height: 36px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--bg-elevated);
    color: var(--ink-2);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 220ms var(--ease);
  }
  .icon-btn:hover { color: var(--accent); border-color: var(--accent); }
  .icon-btn svg { width: 14px; height: 14px; }
  html.dark .icon-btn .moon { display: none; }
  html.dark .icon-btn .sun { display: block; }
  html:not(.dark) .icon-btn .sun { display: none; }
  html:not(.dark) .icon-btn .moon { display: block; }

  /* ============ STREAK ============ */
  .streak-bar {
    max-width: 720px;
    margin: 28px auto 0;
    padding: 0 22px;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 16px;
  }
  .streak-num {
    font-family: var(--font-num);
    font-style: italic;
    font-size: 32px;
    line-height: 1;
    color: var(--accent);
    font-weight: 500;
  }
  .streak-num .u {
    font-family: var(--font-display);
    font-style: normal;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-3);
    margin-left: 6px;
  }
  .day-info {
    font-family: var(--font-display);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.20em;
    text-transform: uppercase;
    color: var(--ink-3);
    text-align: right;
  }
  .day-info .accent { color: var(--accent); }

  /* ============ CARD ============ */
  .card-wrap {
    max-width: 720px;
    margin: 24px auto;
    padding: 0 22px;
  }
  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 14px;
    box-shadow: var(--shadow);
    padding: 36px 32px 32px;
    position: relative;
    overflow: hidden;
    animation: cardIn 600ms var(--ease-spring);
  }
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .card::before {
    content: "";
    position: absolute;
    inset: 0 0 auto 0;
    height: 3px;
    background: linear-gradient(90deg, var(--accent) 0%, var(--gold) 100%);
  }
  @media (max-width: 600px) {
    .card { padding: 28px 20px 24px; border-radius: 12px; }
  }

  .card-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    font-family: var(--font-display);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.20em;
    text-transform: uppercase;
    color: var(--ink-3);
    margin-bottom: 28px;
  }
  .level-chip {
    padding: 4px 10px;
    border-radius: 999px;
    background: var(--accent-soft);
    color: var(--accent-2);
    letter-spacing: 0.16em;
  }
  html.dark .level-chip { color: var(--accent); }

  /* ============ SENTENCE ============ */
  .sentence {
    font-family: var(--font-ko-serif);
    font-size: clamp(26px, 5.5vw, 36px);
    line-height: 1.5;
    color: var(--ink);
    margin: 0 0 14px;
    letter-spacing: -0.005em;
    font-weight: 500;
  }
  .sentence .hl {
    color: var(--accent);
    background: linear-gradient(transparent 62%, var(--accent-soft) 62%);
    padding: 0 2px;
  }
  .pinyin {
    font-family: var(--font-num);
    font-style: italic;
    font-size: clamp(15px, 2.2vw, 18px);
    color: var(--ink-3);
    margin: 0 0 14px;
    letter-spacing: 0.01em;
    transition: opacity 240ms var(--ease), filter 240ms var(--ease);
  }
  .pinyin.hidden, .translation.hidden {
    filter: blur(6px);
    opacity: 0.4;
    cursor: pointer;
  }
  .translation {
    font-family: var(--font-ui);
    font-size: clamp(15px, 2vw, 17px);
    color: var(--ink-2);
    margin: 0 0 22px;
    line-height: 1.55;
    transition: opacity 240ms var(--ease), filter 240ms var(--ease);
  }
  .toggles {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 24px;
  }
  .mini-btn {
    border: 1px solid var(--border);
    background: var(--bg-elevated);
    color: var(--ink-3);
    padding: 7px 13px;
    border-radius: 999px;
    font-family: var(--font-display);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 200ms var(--ease);
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .mini-btn:hover { color: var(--accent); border-color: var(--accent); }
  .mini-btn.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }
  .mini-btn svg { width: 11px; height: 11px; }

  /* ============ SECTIONS ============ */
  .section {
    border-top: 1px solid var(--divider);
    padding-top: 22px;
    margin-top: 22px;
  }
  .section-label {
    font-family: var(--font-display);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.24em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-label::before {
    content: "";
    width: 12px;
    height: 1.5px;
    background: var(--gold);
    display: inline-block;
  }

  .vocab {
    display: flex;
    align-items: baseline;
    gap: 14px;
    flex-wrap: wrap;
  }
  .vocab-word {
    font-family: var(--font-ko-serif);
    font-size: 30px;
    line-height: 1;
    color: var(--accent);
    font-weight: 500;
  }
  .vocab-pinyin {
    font-family: var(--font-num);
    font-style: italic;
    font-size: 16px;
    color: var(--ink-3);
  }
  .vocab-pos {
    font-family: var(--font-display);
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--ink-4);
    padding: 3px 8px;
    border: 1px solid var(--border);
    border-radius: 4px;
  }
  .vocab-jp {
    width: 100%;
    margin-top: 8px;
    font-size: 15px;
    color: var(--ink-2);
  }

  .grammar-pattern {
    font-family: var(--font-ko-serif);
    font-size: 22px;
    color: var(--ink);
    margin-bottom: 6px;
    font-weight: 500;
  }
  .grammar-pattern .romaji {
    font-family: var(--font-num);
    font-style: italic;
    font-size: 16px;
    color: var(--ink-3);
    margin-left: 8px;
  }
  .grammar-explain {
    font-size: 14.5px;
    color: var(--ink-2);
    line-height: 1.65;
    margin: 6px 0 14px;
  }
  .examples {
    list-style: none;
    padding: 0;
    margin: 12px 0 0;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .examples li {
    padding: 10px 14px;
    background: var(--bg-subtle);
    border-radius: 8px;
    font-size: 14px;
  }
  .examples .cn {
    font-family: var(--font-ko-serif);
    font-size: 17px;
    color: var(--ink);
    margin-right: 10px;
  }
  .examples .jp {
    color: var(--ink-3);
    font-size: 13px;
    display: block;
    margin-top: 3px;
  }

  /* ============ ACTIONS ============ */
  .actions {
    display: flex;
    gap: 10px;
    margin-top: 30px;
    padding-top: 24px;
    border-top: 1px solid var(--divider);
    flex-wrap: wrap;
  }
  .btn {
    flex: 1;
    min-width: 140px;
    padding: 14px 18px;
    border-radius: 10px;
    font-family: var(--font-display);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    cursor: pointer;
    border: 1px solid var(--border);
    background: var(--bg-elevated);
    color: var(--ink-2);
    transition: all 240ms var(--ease);
  }
  .btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    transform: translateY(-1px);
  }
  .btn.primary {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
    box-shadow: 0 6px 18px var(--accent-glow);
  }
  .btn.primary:hover {
    background: var(--accent-2);
    color: #fff;
    box-shadow: 0 10px 24px var(--accent-glow);
  }
  .btn.done {
    background: var(--good-soft);
    color: var(--good);
    border-color: transparent;
    pointer-events: none;
  }

  /* ============ REVIEW DRAWER ============ */
  .review-section {
    max-width: 720px;
    margin: 0 auto 80px;
    padding: 0 22px;
  }
  .review-empty {
    text-align: center;
    color: var(--ink-3);
    font-size: 13px;
    padding: 30px 0;
  }
  .review-head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin: 32px 0 16px;
    gap: 12px;
  }
  .review-title {
    font-family: var(--font-display);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.24em;
    text-transform: uppercase;
    color: var(--ink-3);
  }
  .review-title .accent { color: var(--accent); }
  .review-toggle {
    background: none;
    border: none;
    color: var(--accent);
    font-family: var(--font-display);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    cursor: pointer;
    padding: 6px 0;
  }
  .review-toggle:hover { color: var(--accent-2); }
  .review-list {
    display: none;
    flex-direction: column;
    gap: 12px;
  }
  .review-list.open { display: flex; }
  .review-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px 20px;
    cursor: pointer;
    transition: all 200ms var(--ease);
  }
  .review-card:hover {
    border-color: var(--accent);
    transform: translateY(-1px);
    box-shadow: var(--shadow);
  }
  .review-card-top {
    display: flex;
    justify-content: space-between;
    font-family: var(--font-display);
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.20em;
    text-transform: uppercase;
    color: var(--ink-4);
    margin-bottom: 8px;
  }
  .review-card-sent {
    font-family: var(--font-ko-serif);
    font-size: 19px;
    color: var(--ink);
    margin-bottom: 4px;
  }
  .review-card-jp {
    font-size: 12.5px;
    color: var(--ink-3);
  }
  .review-card.learned { border-color: var(--good-soft); }
  .review-card.learned::after {
    content: "✓";
    color: var(--good);
    float: right;
    font-weight: 700;
  }

  /* ============ MODAL ============ */
  .modal-back {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.55);
    backdrop-filter: blur(4px);
    z-index: 200;
    display: none;
    align-items: flex-start;
    justify-content: center;
    overflow-y: auto;
    padding: 50px 16px;
  }
  .modal-back.open { display: flex; }
  .modal {
    width: 100%;
    max-width: 680px;
    background: var(--bg);
    border-radius: 14px;
    overflow: hidden;
    box-shadow: var(--shadow-lg);
    position: relative;
  }
  .modal-close {
    position: absolute;
    top: 14px;
    right: 14px;
    width: 32px; height: 32px;
    border-radius: 50%;
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    color: var(--ink-2);
    cursor: pointer;
    z-index: 2;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
  }
  .modal-close:hover { color: var(--accent); border-color: var(--accent); }

  /* ============ FOOTER ============ */
  .footer {
    text-align: center;
    padding: 40px 22px 60px;
    font-family: var(--font-display);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.24em;
    text-transform: uppercase;
    color: var(--ink-4);
  }
  .footer .sep { margin: 0 8px; color: var(--ink-5); }
</style>
<link rel="stylesheet" href="clips.css?v=6">
<script src="clips.js?v=6" defer></script>
</head>
<body>

<header class="topbar">
  <a class="brand" href="index.html" aria-label="Home">
    <span class="brand-mark">日</span>
    <span class="brand-text">日々<span class="brand-sep">·</span>One a Day</span>
  </a>
  <div class="topbar-actions">
    <button class="icon-btn" id="theme-toggle" aria-label="テーマ切り替え">
      <svg class="moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      <svg class="sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
    </button>
  </div>
</header>

<section class="streak-bar">
  <div class="streak-num" id="streak"><span class="n">0</span><span class="u">日連続</span></div>
  <div class="day-info" id="day-info">DAY <span class="accent">001</span> · — · —</div>
</section>

<main class="card-wrap">
  <article class="card" id="card"></article>
</main>

<section class="review-section">
  <div class="review-head">
    <div class="review-title">過去のカード · <span class="accent" id="learned-count">0</span> 覚えた</div>
    <button class="review-toggle" id="review-toggle">表示 ▾</button>
  </div>
  <div class="review-list" id="review-list">
    <div class="review-empty" id="review-empty">まだ過去カードはありません</div>
  </div>
</section>

<div class="modal-back" id="modal-back">
  <div class="modal" id="modal"></div>
</div>

<footer class="footer">
  KOREAN <span class="sep">·</span> ONE A DAY <span class="sep">·</span> 日々
</footer>

<script>
  /* ================================================================
     CONTENT — 30日分の素材
     ================================================================ */
  const CARDS = [
    // ============ DAY 1-10: TOPIK 1 基礎 ============
    {
      level: "TOPIK 1",
      sentence: "안녕하세요, 저는 다나카입니다.",
      hl: "입니다",
      pinyin: "annyeonghaseyo, jeoneun danakaimnida.",
      jp: "こんにちは、私は田中です。",
      word: { w: "저", p: "jeo", pos: "代名詞", jp: "私 (謙譲)" },
      grammar: {
        pattern: "N + 입니다 / 입니까?",
        explain: "「〜です」のかしこまった形(합니다体)。疑問は「입니까?」。日常では「이에요/예요」も多用される。",
        examples: [
          { cn: "저는 학생입니다.", jp: "私は学生です。" },
          { cn: "이름이 뭐예요?", jp: "お名前は？" }
        ]
      }
    },

          { cn: "친구 중에서 그가 제일 친해요.", jp: "友達の中で彼が一番親しい。" },
          { cn: "과일 중에서 사과가 가장 좋아요.", jp: "果物の中でりんごが一番好き。" }
        ]
      }
    },
    {
      level: "TOPIK 2",
      sentence: "한국에 가려고 공부해요.",
      hl: "려고",
      pinyin: "hanguk-e garyeo-go gongbu-haeyo.",
      jp: "韓国に行くために勉強しています。",
      word: { w: "공부하다", p: "gongbuhada", pos: "動詞", jp: "勉強する" },
      grammar: {
        pattern: "V + (으)려고",
        explain: "目的「〜しようと」。主語の意思的な目的に使う。「-기 위해서」(よりフォーマル) との使い分け。",
        examples: [
          { cn: "선물을 사려고 왔어요.", jp: "プレゼントを買おうと来ました。" },
          { cn: "한국어를 배우려고 해요.", jp: "韓国語を学ぼうとしています。" }
        ]
      }
    },
    {
      level: "TOPIK 3",
      sentence: "비가 오니까 우산을 가져가세요.",
      hl: "니까",
      pinyin: "bi-ga onikka usan-eul gajyeoga-seyo.",
      jp: "雨が降っているので傘を持っていってください。",
      word: { w: "우산", p: "usan", pos: "名詞", jp: "傘" },
      grammar: {
        pattern: "V/A + (으)니까",
        explain: "理由を表す「〜なので」。「-아서/어서」と違い、後ろに命令・勧誘・提案を続けられる: 비가 오니까 가지 마세요 (雨だから行かないで)。",
        examples: [
          { cn: "추우니까 따뜻하게 입으세요.", jp: "寒いので暖かく着てください。" },
          { cn: "시간이 없으니까 빨리 가요.", jp: "時間がないから早く行こう。" }
        ]
      }
    },
    {
      level: "TOPIK 3",
      sentence: "한국에 살게 됐어요.",
      hl: "게 됐어요",
      pinyin: "hanguk-e salge dwaesseoyo.",
      jp: "韓国に住むことになりました。",
      word: { w: "살다", p: "salda", pos: "動詞", jp: "住む/生きる" },
      grammar: {
        pattern: "V + 게 되다",
        explain: "「〜することになる」。自分の意思とは別の流れで結果的にそうなった、というニュアンス。日本語の「〜することになった」とそっくり。",
        examples: [
          { cn: "그를 좋아하게 됐어요.", jp: "彼を好きになりました。" },
          { cn: "회사를 그만두게 됐어요.", jp: "会社を辞めることになりました。" }
        ]
      }
    }
  ];

  /* ================================================================
     STATE
     ================================================================ */
  const STORAGE_KEY = 'today-ko-progress';
  const THEME_KEY = 'today-ko-theme';

  function loadState() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return defaultState();
      const s = JSON.parse(raw);
      return Object.assign(defaultState(), s);
    } catch (e) { return defaultState(); }
  }
  function defaultState() {
    return { startDate: null, learned: {}, lastOpen: null, streak: 0 };
  }
  function saveState(s) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(s));
  }

  function todayStr() {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }
  function daysBetween(aStr, bStr) {
    const a = new Date(aStr + 'T00:00:00');
    const b = new Date(bStr + 'T00:00:00');
    return Math.round((b - a) / 86400000);
  }

  let state = loadState();
  const today = todayStr();

  if (!state.startDate) {
    state.startDate = today;
    state.lastOpen = today;
    state.streak = 1;
  } else if (state.lastOpen !== today) {
    const diff = daysBetween(state.lastOpen, today);
    if (diff === 1) state.streak += 1;
    else if (diff > 1) state.streak = 1;
    state.lastOpen = today;
  }
  saveState(state);

  const dayIndex = Math.min(daysBetween(state.startDate, today), CARDS.length - 1);
  const card = CARDS[dayIndex];

  /* ================================================================
     RENDER
     ================================================================ */
  function highlightSentence(s, hl) {
    if (!hl) return s;
    return s.replaceAll(hl, `<span class="hl">${hl}</span>`);
  }
  function formatDateDisplay(d) {
    const parts = d.split('-');
    return `${parts[0]}.${parts[1]}.${parts[2]}`;
  }
  function renderCard(c, idx, container) {
    container.innerHTML = `
      <div class="card-meta">
        <span>DAY ${String(idx + 1).padStart(3, '0')} · ${formatDateDisplay(today)}</span>
        <span class="level-chip">${c.level}</span>
      </div>
      <p class="sentence">${highlightSentence(c.sentence, c.hl)}</p>
      <p class="pinyin">${c.pinyin}</p>
      <p class="translation">${c.jp}</p>
      <div class="toggles">
        <button class="mini-btn active" data-target=".pinyin">발음</button>
        <button class="mini-btn active" data-target=".translation">和訳</button>
        <button class="mini-btn" data-speak="${c.sentence}">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>
          音声
        </button>
      </div>
      <div class="section">
        <div class="section-label">今日の単語</div>
        <div class="vocab">
          <span class="vocab-word">${c.word.w}</span>
          <span class="vocab-pinyin">${c.word.p}</span>
          <span class="vocab-pos">${c.word.pos}</span>
          <div class="vocab-jp">${c.word.jp}</div>
        </div>
      </div>
      <div class="section">
        <div class="section-label">今日の文法</div>
        <div class="grammar-pattern">${c.grammar.pattern}</div>
        <p class="grammar-explain">${c.grammar.explain}</p>
        <ul class="examples">
          ${c.grammar.examples.map(ex =>
            `<li><span class="cn">${ex.cn}</span><span class="jp">${ex.jp}</span></li>`
          ).join('')}
        </ul>
      </div>
    `;
    wireToggles(container);
  }

  function wireToggles(container) {
    container.querySelectorAll('.mini-btn[data-target]').forEach(btn => {
      btn.addEventListener('click', () => {
        const target = container.querySelector(btn.dataset.target);
        if (!target) return;
        target.classList.toggle('hidden');
        btn.classList.toggle('active');
      });
    });
    container.querySelectorAll('[data-speak]').forEach(btn => {
      btn.addEventListener('click', () => speakKo(btn.dataset.speak));
    });
    container.querySelectorAll('.pinyin, .translation').forEach(el => {
      el.addEventListener('click', () => {
        if (el.classList.contains('hidden')) {
          el.classList.remove('hidden');
          const target = '.' + el.classList[0];
          const btn = container.querySelector(`.mini-btn[data-target="${target}"]`);
          if (btn) btn.classList.add('active');
        }
      });
    });
  }

  function speakKo(text) {
    if (!('speechSynthesis' in window)) return;
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'ko-KR';
    u.rate = 0.85;
    speechSynthesis.speak(u);
  }

  /* ================================================================
     MAIN — wire today's card
     ================================================================ */
  const cardEl = document.getElementById('card');
  renderCard(card, dayIndex, cardEl);

  const actionsHTML = `
    <div class="actions">
      <button class="btn primary" id="btn-learned">${state.learned[dayIndex] ? '✓ 覚えた' : '覚えた'}</button>
      <button class="btn" id="btn-review">復習する ↓</button>
    </div>
  `;
  cardEl.insertAdjacentHTML('beforeend', actionsHTML);

  if (state.learned[dayIndex]) {
    const b = document.getElementById('btn-learned');
    b.classList.add('done');
  }

  document.getElementById('btn-learned').addEventListener('click', () => {
    state.learned[dayIndex] = Date.now();
    saveState(state);
    const b = document.getElementById('btn-learned');
    b.classList.add('done');
    b.textContent = '✓ 覚えた';
    renderReviewList();
  });

  document.getElementById('btn-review').addEventListener('click', () => {
    const list = document.getElementById('review-list');
    list.classList.add('open');
    document.getElementById('review-toggle').textContent = '隠す ▴';
    list.scrollIntoView({ behavior: 'smooth', block: 'start' });
  });

  /* ============ Header ============ */
  document.querySelector('#streak .n').textContent = state.streak;
  document.getElementById('day-info').innerHTML =
    `DAY <span class="accent">${String(dayIndex + 1).padStart(3, '0')}</span> · ${card.level} · ${formatDateDisplay(today)}`;

  /* ============ Review section ============ */
  function renderReviewList() {
    const list = document.getElementById('review-list');
    const past = [];
    for (let i = 0; i < dayIndex; i++) past.push(i);
    if (past.length === 0) {
      list.innerHTML = '<div class="review-empty">まだ過去カードはありません。明日また会いましょう。</div>';
      document.getElementById('learned-count').textContent = Object.keys(state.learned).length;
      return;
    }
    list.innerHTML = past.reverse().map(i => {
      const c = CARDS[i];
      const learned = !!state.learned[i];
      return `
        <div class="review-card ${learned ? 'learned' : ''}" data-idx="${i}">
          <div class="review-card-top">
            <span>DAY ${String(i + 1).padStart(3, '0')}</span>
            <span>${c.level}</span>
          </div>
          <div class="review-card-sent">${c.sentence}</div>
          <div class="review-card-jp">${c.jp}</div>
        </div>
      `;
    }).join('');
    list.querySelectorAll('.review-card').forEach(el => {
      el.addEventListener('click', () => openReviewModal(parseInt(el.dataset.idx, 10)));
    });
    document.getElementById('learned-count').textContent = Object.keys(state.learned).length;
  }

  document.getElementById('review-toggle').addEventListener('click', () => {
    const list = document.getElementById('review-list');
    const t = document.getElementById('review-toggle');
    list.classList.toggle('open');
    t.textContent = list.classList.contains('open') ? '隠す ▴' : '表示 ▾';
  });

  renderReviewList();

  /* ============ Modal ============ */
  const modalBack = document.getElementById('modal-back');
  const modal = document.getElementById('modal');

  function openReviewModal(idx) {
    const c = CARDS[idx];
    modal.innerHTML = `
      <button class="modal-close" id="modal-close" aria-label="閉じる">✕</button>
      <div class="card" style="border:none; box-shadow:none; border-radius:14px;"></div>
    `;
    const innerCard = modal.querySelector('.card');
    renderCard(c, idx, innerCard);
    modalBack.classList.add('open');
    document.body.style.overflow = 'hidden';
    document.getElementById('modal-close').addEventListener('click', closeModal);
  }
  function closeModal() {
    modalBack.classList.remove('open');
    document.body.style.overflow = '';
    speechSynthesis.cancel();
  }
  modalBack.addEventListener('click', (e) => {
    if (e.target === modalBack) closeModal();
  });
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeModal();
  });

  /* ============ Theme ============ */
  document.getElementById('theme-toggle').addEventListener('click', () => {
    const dark = document.documentElement.classList.toggle('dark');
    localStorage.setItem(THEME_KEY, dark ? 'dark' : 'light');
  });

</script>
</body>
</html>
